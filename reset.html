<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset StudyBuddy</title>
<style>
  body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#4F46E5; color:#fff; gap:16px; padding:24px; text-align:center; }
  h1 { font-size:28px; margin:0; }
  p { font-size:16px; opacity:.85; margin:0; }
  button { background:#fff; color:#4F46E5; border:none; border-radius:12px; padding:16px 32px; font-size:18px; font-weight:800; cursor:pointer; margin-top:8px; }
  .ok { background:#10B981; color:#fff; border-radius:12px; padding:16px 24px; font-size:16px; font-weight:700; display:none; }
</style>
</head>
<body>
  <div style="font-size:56px">🦜</div>
  <h1>StudyBuddy Reset</h1>
  <p>Limpia la sesión guardada y vuelve al login</p>
  <button onclick="doReset()">🗑 Limpiar y reiniciar</button>
  <div class="ok" id="ok">✅ Listo — redirigiendo...</div>
<script>
function doReset() {
  localStorage.clear()
  sessionStorage.clear()
  document.getElementById('ok').style.display = 'block'
  setTimeout(() => {
    window.location.href = './index.html'
  }, 1500)
}
</script>
</body>
</html>
